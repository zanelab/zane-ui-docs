name: Deploy Website on push

on:
  push:
    branches:
      - main

jobs:
  deploy-docs-ftp:
    name: Deploy Docs to GitHub Pages
    if: github.actor != 'dependabot[bot]' && !contains(github.event.head_commit.message, '[skip ci]') && github.repository == 'zanelab/zane-ui-docs'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Build
        run: pnpm build

      
      - name: Push to zane-ui-docs
        id: push_directory
        uses: cpina/github-action-push-to-another-repository@target-branch
        env:
          API_TOKEN_GITHUB: ${{ secrets.API_TOKEN_GITHUB }}
        with:
          source-directory: ./.vitepress/dist
          destination-github-username: 'zanelab'
          destination-repository-name: 'zane-ui-docs'
          user-email: ${{ secrets.USER_EMAIL }}
          commit-message: See ORIGIN_COMMIT from $GITHUB_REF
          target-branch: gh-pages
